---
- name: Install Apache on Apache Server
  hosts: apache
  become: yes

  tasks:
    - name: Install Apache2
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Start Apache2
      service:
        name: apache2
        state: started
        enabled: yes

- name: Install Nginx on Nginx Server
  hosts: nginx
  become: yes

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: yes
